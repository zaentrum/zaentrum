name: Sync docs to Wiki

# The repo's docs/ is the single source of truth; the GitHub Wiki is a generated
# mirror. On every change to docs/ (or the generator) this rebuilds the wiki with
# scripts/build-wiki.py and pushes it. Never edit the wiki directly — it is
# overwritten on the next sync.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build-wiki.py"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build wiki from docs/ and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki
          python3 scripts/build-wiki.py docs wiki
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "docs: sync wiki from ${GITHUB_SHA}"
            git push
            echo "wiki synced"
          else
            echo "wiki already up to date"
          fi
